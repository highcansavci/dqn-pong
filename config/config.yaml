env:
  name: PongNoFrameskip-v4
  mean_reward_threshold: 18

agent:
  device: cuda
  gamma: 0.99
  lr: 0.00025
  batch_size: 128
  buffer_size: 100000
  target_update_freq: 1000
  epsilon_start: 1.0
  epsilon_end: 0.1
  epsilon_decay_frames: 1000000
  replay_initial_size: 10000
  train_freq: 4
  n_steps: 3
  per_alpha: 0.6
  per_beta_start: 0.4
  per_beta_frames: 1000000
  save_path: "checkpoints/dqn.pth"
